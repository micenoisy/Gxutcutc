name: 🔍 AI Analyzer - Ultra Fast Mode
on:
  push:
    paths: [ 'analyze_config.json' ]
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Videos First
        run: |
          pip install gdown
          mkdir -p input
          python3 -c "import gdown, json, os; jobs = json.load(open('analyze_config.json')); [gdown.download(j['url'], output='input/', quiet=False, fuzzy=True) for j in jobs]"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Cache Whisper Model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-base-model-v2

      - name: Install Heavy Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install openai-whisper gdown

      - name: Run Batch Analysis
        run: python3 scripts/analyzer.py

      # NEW: This prints the text directly to the GitHub Action Summary page
      - name: Display Report in Summary
        run: |
          echo "### 📄 Master Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat reports/master_analysis.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Report (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: master-analysis-report
          path: reports/master_analysis.txt
