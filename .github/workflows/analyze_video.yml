name: 🔍 AI Analyzer - Download First
on:
  push:
    paths: [ 'analyze_config.json' ]
jobs:
  analyze:
    runs-on: ubuntu-latest
    container: python:3.9-slim
    steps:
      - uses: actions/checkout@v4 # Updated to v4
      - name: Download Video First
        run: |
          pip install gdown
          python3 -c "import gdown, json; links = json.load(open('analyze_config.json')); [gdown.download(l['url'], output=f'input/{l[\"original_file\"]}', fuzzy=True) for l in links]"
      - name: Install Heavy Tools
        run: |
          apt-get update && apt-get install -y ffmpeg
          pip install openai-whisper
      - name: Run Analysis
        run: python3 scripts/analyzer.py
      - name: Upload Report
        uses: actions/upload-artifact@v4 # FIXED: Updated v3 to v4
        with:
          name: analysis-report
          path: reports/
