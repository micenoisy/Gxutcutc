name: 🔍 AI Analyzer - Max Cache Mode
on:
  push:
    paths: [ 'analyze_config.json' ]
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. DOWNLOAD FIRST (Reuse logic)
      - name: Download Videos
        run: |
          pip install gdown
          mkdir -p input
          python3 -c "import gdown, json, os; jobs = json.load(open('analyze_config.json')); [gdown.download(j['url'], output='input/', quiet=False, fuzzy=True) for j in jobs]"

      # 2. MAX CACHE: Python & Pip
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      # 3. MAX CACHE: Whisper AI Model
      - name: Cache Whisper Model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-base-v3

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install openai-whisper gdown

      - name: Run Microsecond Analysis
        run: python3 scripts/analyzer.py

      - name: Display Report in Summary
        run: |
          echo "### 📄 MICROSECOND WORD REPORT" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat reports/precision_report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
