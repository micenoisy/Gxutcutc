name: 🔍 AI Analyzer - Ultra Fast Mode
on:
  push:
    paths: [ 'analyze_config.json' ]
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Video First
        run: |
          pip install gdown
          mkdir -p input
          python3 -c "import gdown, json, os; links = json.load(open('analyze_config.json')); [gdown.download(l['url'], output='input/', quiet=False, fuzzy=True) for l in links]"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Cache Whisper Model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-base-model-v2

      - name: Install Heavy Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install openai-whisper gdown

      - name: Run Analysis
        run: python3 scripts/analyzer.py

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report
          path: reports/
