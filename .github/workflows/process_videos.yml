name: AI Video Agent - Pro Multi-Tasking
on:
  push:
    paths:
      - 'master_config.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code (LFS Enabled)
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Cache Whisper Model
        uses: actions/cache@v3
        with:
          path: ~/.cache/whisper
          key: whisper-base-v2 # Constant key to ensure 0-second loading

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git-lfs

      - name: Install Python Libraries
        run: pip install -r requirements.txt

      - name: Run Multi-Task AI Agent
        run: python3 scripts/processor.py

      - name: Commit and Push Finished Clips
        run: |
          git config --global user.name "AI-Video-Agent"
          git config --global user.email "agent@github.com"
          git add output/
          git commit -m "Batch Processed: #viralitypoly" || echo "No changes"
          git push
