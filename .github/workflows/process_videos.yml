name: 🎬 AI Production - Fast Mode
on:
  push:
    paths: [ 'master_config.json' ]
jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.9-slim
    steps:
      - uses: actions/checkout@v3
      - name: Download Videos First
        run: |
          pip install gdown
          python3 -c "import gdown, json; jobs = json.load(open('master_config.json')); [gdown.download(j['gdrive_url'], output=f'input/{j[\"original_file\"]}', fuzzy=True) for j in jobs if 'gdrive_url' in j]"
      - name: Setup Tools
        run: |
          apt-get update && apt-get install -y ffmpeg
          pip install openai-whisper
      - name: Process Clips
        run: python3 scripts/processor.py
      - name: Save Results
        run: |
          git config --global user.name "AI-Agent"
          git add output/
          git commit -m "Viral batch #viralitypoly" || echo "No changes"
          git push
