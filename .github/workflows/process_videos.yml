name: AI Video Agent - Fast Cache + Whisper
on:
  push:
    paths:
      - 'master_config.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Cache Pip Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Whisper Model
        uses: actions/cache@v3
        with:
          path: ~/.cache/whisper
          key: ${{ runner.os }}-whisper-base

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install openai-whisper moviepy

      - name: Process Videos
        run: python3 scripts/processor.py

      - name: Commit and Push to Repo
        run: |
          git config --global user.name "AI-Video-Agent"
          git config --global user.email "agent@github.com"
          git add output/
          git commit -m "Viral content ready #viralitypoly" || echo "No changes"
          git push
