name: 🎬 AI Production - Fast Docker Mode
on:
  push:
    paths:
      - 'master_config.json'

jobs:
  build:
    runs-on: ubuntu-latest
    container: 
      image: micenoisy/ai-video-base:latest # I suggest creating a docker image with whisper/ffmpeg pre-installed
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # STEP 1: DOWNLOAD FIRST
      - name: Download Videos
        run: |
          python3 -c "import gdown, json; jobs = json.load(open('master_config.json')); [gdown.download(j['gdrive_url'], output=f'input/{j['original_file']}', fuzzy=True) for j in jobs if 'gdrive_url' in j]"

      # STEP 2: PROCESS (Fast because dependencies are pre-installed in Docker)
      - name: Run Multi-Task Production
        run: python3 scripts/processor.py

      - name: Save Results
        run: |
          git config --global user.name "AI-Agent"
          git add output/
          git commit -m "Viral batch #viralitypoly" || echo "No changes"
          git push
