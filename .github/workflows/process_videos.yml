name: AI Video Agent - GDrive Folder + Super Cache
on:
  push:
    paths:
      - 'master_config.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # Automated caching for pip

      - name: Cache Whisper Model
        uses: actions/cache@v3
        with:
          path: ~/.cache/whisper
          key: whisper-base-v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python Libraries
        run: |
          pip install -r requirements.txt

      - name: Process Videos
        run: python3 scripts/processor.py

      - name: Commit and Push
        run: |
          git config --global user.name "AI-Video-Agent"
          git config --global user.email "agent@github.com"
          git add output/
          git commit -m "Viral batch processed #viralitypoly" || echo "No changes"
          git push
