name: AI Video Agent - Fast Cache + LFS Fix
on:
  push:
    paths:
      - 'master_config.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code (with LFS for Videos)
        uses: actions/checkout@v3
        with:
          lfs: true # <--- THIS FIXES THE "INVALID DATA" ERROR

      - name: Checkout LFS objects
        run: git lfs pull # Ensures the actual video data is downloaded

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # Built-in python caching

      - name: Cache Whisper Model
        uses: actions/cache@v3
        with:
          path: ~/.cache/whisper
          key: whisper-base-model

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install openai-whisper moviepy

      - name: Process Videos
        run: python3 scripts/processor.py

      - name: Commit and Push
        run: |
          git config --global user.name "AI-Video-Agent"
          git config --global user.email "agent@github.com"
          git add output/
          git commit -m "Processed video #viralitypoly" || echo "No changes"
          git push
