name: AI Video Agent - Multi-Task Pro
on:
  push:
    paths:
      - 'master_config.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Cache Whisper Model
        uses: actions/cache@v3
        with:
          path: ~/.cache/whisper
          key: whisper-base-v2 # Constant key keeps it fast

      - name: Install System Tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Process Multiple Tasks
        run: python3 scripts/processor.py

      - name: Save Results
        run: |
          git config --global user.name "AI-Video-Agent"
          git config --global user.email "agent@github.com"
          git add output/
          git commit -m "Processed batch #viralitypoly" || echo "No changes"
          git push
