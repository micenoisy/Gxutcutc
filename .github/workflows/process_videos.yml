name: AI Video Agent - Final Download Fix
on:
  push:
    paths:
      - 'master_config.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Process Videos
        run: python3 scripts/processor.py

      - name: Commit and Push
        run: |
          git config --global user.name "AI-Video-Agent"
          git config --global user.email "agent@github.com"
          git add output/
          git commit -m "Viral Video Processed #viralitypoly" || echo "No changes"
          git push
