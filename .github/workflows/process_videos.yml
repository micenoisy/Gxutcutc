name: 🎬 AI Production - Max Cache Mode
on:
  push:
    paths: [ 'master_config.json' ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Videos
        run: |
          pip install gdown
          mkdir -p input
          python3 -c "import gdown, json, os; jobs = json.load(open('master_config.json')); [gdown.download(j['gdrive_url'], output='input/', quiet=False, fuzzy=True) for j in jobs if 'gdrive_url' in j]"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install System Tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg git

      - name: Process Clips
        run: python3 scripts/processor.py

      - name: Save Results
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "AI-Agent"
          git config --global user.email "agent@github.com"
          git add output/
          git commit -m "Viral batch #viralitypoly" || echo "No changes"
          git push
